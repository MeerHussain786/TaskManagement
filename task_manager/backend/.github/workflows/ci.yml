name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── LINT & TEST JOB ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff Linter
        run: ruff check .

      - name: Check Ruff Formatting
        run: ruff format --check .

      - name: Run Type Checking (Mypy)
        run: mypy app/

      - name: Run Security Scan (Bandit)
        run: bandit -c pyproject.toml -r app/

      - name: Run Test Suite with Coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-fail-under=95

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── DOCKER BUILD JOB ───────────────────────────────────────────────────────
  docker-build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export to Docker daemon
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: taskmanager-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image health checks respond
        run: |
          docker run --name test-api -d -p 8000:8000 \
            -e JWT_SECRET_KEY=VERIFICATION-SECRET-KEY-MUST-BE-AT-LEAST-32-CHARS \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e ENABLE_TRACING=false \
            -e ENABLE_METRICS=true \
            taskmanager-api:test
          sleep 5
          docker inspect --format='{{json .State.Health}}' test-api
          docker stop test-api
